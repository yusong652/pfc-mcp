name: Publish pfc-mcp-bridge

on:
  push:
    tags:
      - "bridge-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-bridge
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#bridge-v}"
          awk -v ver="$VERSION" '
            BEGIN { marker = "## [" ver "]" }
            index($0, marker) == 1 { found=1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' pfc-mcp-bridge/CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION in pfc-mcp-bridge/CHANGELOG.md"
            exit 1
          fi
          echo "--- release notes ---"
          cat release-notes.md

      - uses: astral-sh/setup-uv@v8
      - run: cd pfc-mcp-bridge && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pfc-mcp-bridge/dist/
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: pfc-mcp-bridge/dist/*
