name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/ pfc-mcp-bridge/tests/
      - run: uv run ruff format --check src/ tests/ pfc-mcp-bridge/tests/
      - run: uv run mypy src/pfc_mcp/
      - run: uv run pytest tests/ --cov=pfc_mcp --cov-report=term-missing
      - run: uv run pytest pfc-mcp-bridge/tests/
