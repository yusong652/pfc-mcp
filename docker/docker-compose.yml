# Compose file for the pfc-mcp dev container.
#
# Usage (run from repo root):
#   docker compose -f docker/docker-compose.yml up --build
#
# Or via the helper:
#   ./docker/run.sh
#
# After it boots:
#   - GUI in browser:  http://localhost:6080/vnc.html
#   - Bridge socket:   http://localhost:9001
#
# Stop with Ctrl-C (or `docker compose down` from another terminal).

services:
  pfc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # The 2.5 GB Itasca .deb is bind-mounted from this directory at build
      # time so it never lands in a Docker layer. Override location with
      # ITASCA_DEB_DIR=/path/to/dir before invoking compose.
      additional_contexts:
        itasca-deb: ${ITASCA_DEB_DIR:-${HOME}/Downloads}
    image: pfc-mcp:dev
    platform: linux/amd64
    # Invoke the bind-mounted entrypoint via bash so a missing exec bit on
    # the host file (Edit/Write tools don't preserve it) doesn't kill the
    # container.
    entrypoint: ["bash", "/usr/local/bin/entrypoint.sh"]
    # Pass through PFC_GUI so `PFC_GUI=1 ./docker/run.sh` flips on the X
    # stack + noVNC. Default (unset) is headless console mode.
    environment:
      PFC_GUI: "${PFC_GUI:-}"
    ports:
      - "9001:9001"   # itasca-mcp-bridge WebSocket
      - "6080:6080"   # noVNC HTML5 viewer (GUI mode only)
    volumes:
      # Live-edit bridge source: host changes apply immediately, paired with
      # the editable install baked into the image.
      - ../itasca-mcp-bridge/src/itasca_mcp_bridge:/opt/itasca-mcp-bridge/src/itasca_mcp_bridge
      # Live-edit the entrypoint without rebuilding -- handy while we are
      # still figuring out the right startup choreography.
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      # Workspace for user simulation scripts/data. Edit on host, run inside
      # the container.
      - ../workspace:/workspace
    stdin_open: true
    tty: true
